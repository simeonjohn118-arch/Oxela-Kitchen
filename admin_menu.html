<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <title>Master Menu | O'XELA KITCHEN PRO</title>
    <style>
        :root { 
            --oxela-orange: #e67e22; 
            --oxela-dark: #d35400; 
            --oxela-light: #f4f7f6;
            --success: #27ae60;
            --danger: #e74c3c;
            --pro-purple: #8e44ad;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--oxela-light); margin: 0; padding: 20px; color: #333; }
        
        .container { max-width: 1400px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--oxela-light); padding-bottom: 25px; margin-bottom: 30px; }
        .header h2 { color: var(--oxela-dark); margin: 0; font-size: 1.8rem; }
        .back-link { text-decoration: none; color: var(--oxela-orange); font-weight: bold; font-size: 0.9rem; transition: 0.3s; }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        
        .pro-card { background: #fffdfb; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .inflation-card { border-left: 5px solid var(--danger); }
        .promo-card { border-left: 5px solid var(--pro-purple); }

        .dash-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 10px; }
        
        .add-item-box { 
            background: #fffdfb; padding: 25px; border-radius: 12px; border: 2px dashed var(--oxela-orange); 
            margin-bottom: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; align-items: end; 
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.8rem; font-weight: bold; color: #555; margin-bottom: 8px; }
        .form-group input, .form-group select { 
            padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; outline-color: var(--oxela-orange);
        }

        .combo-manager { background: #fdf2f2; padding: 10px; border-radius: 8px; margin-top: 15px; border: 1px solid #fadbd8; }
        .combo-tag { 
            display: inline-flex; align-items: center; background: white; padding: 5px 10px; 
            border-radius: 20px; border: 1px solid #ddd; margin: 5px; font-size: 0.85rem;
        }
        .combo-tag input { border: none; width: 60px; font-weight: bold; color: var(--danger); margin-left: 5px; outline: none; }
        
        .add-btn { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.3s; height: 42px; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { text-align: left; background: var(--oxela-light); padding: 15px; color: #666; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; }
        
        .img-preview { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; background: #eee; }
        .table-input { width: 100%; padding: 8px; border: 1px solid #eee; border-radius: 6px; font-size: 0.85rem; }
        .stock-input { font-weight: bold; color: var(--pro-purple); border: 1px solid #dcd0ff; }
        
        .save-btn { background: var(--oxela-orange); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .del-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; margin-left: 5px; }

        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center;
            border-radius: 10px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .del-btn { 
    background: transparent; 
    color: var(--danger); 
    border: none; 
    font-weight: bold; 
    font-size: 18px; 
    cursor: pointer; 
    transition: 0.2s;
}
.del-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div id="toast">Message</div>

<div class="container">
    <div class="header">
        <h2>Master Menu Dashboard <span style="font-size: 0.8rem; background: var(--oxela-dark); color: white; padding: 4px 8px; border-radius: 5px; vertical-align: middle;">PRO</span></h2>
        <a href="admin_hub.html" class="back-link">← RETURN TO HUB</a>
    </div>

    <div class="dashboard-grid">
        <div class="pro-card inflation-card">
            <strong style="color: var(--danger)">📈 Inflation / Combo Price Manager</strong>
            <p style="font-size: 0.75rem; color: #777; margin: 5px 0;">Update prices across the menu based on ingredients (e.g., all Chicken items).</p>
            
            <div id="combo-list" class="dash-row">
                <div class="combo-tag">Chicken: ₦<input type="number" class="inflation-val" data-match="Chicken" value="1200"></div>
                <div class="combo-tag">Egg: ₦<input type="number" class="inflation-val" data-match="Egg" value="300"></div>
                <div class="combo-tag">Meat: ₦<input type="number" class="inflation-val" data-match="Meat" value="800"></div>
            </div>

            <div class="combo-manager">
                <div class="dash-row" style="margin-top:0;">
                    <input type="text" id="customComboName" placeholder="New side (e.g. Fish)" style="padding:8px; border-radius:5px; border:1px solid #ddd; flex:1;">
                    <input type="number" id="customComboPrice" placeholder="Price" style="padding:8px; border-radius:5px; border:1px solid #ddd; width:80px;">
                    <button class="add-btn" style="height:35px; padding:0 15px;" onclick="addNewComboRow()">+ ADD SIDE</button>
                    <button class="save-btn" style="background: var(--danger); height:35px;" onclick="applyInflation()">APPLY TO ALL ITEMS</button>
                </div>
            </div>
        </div>

        <div class="pro-card promo-card">
            <strong style="color: var(--pro-purple)">🎊 Global Promotion</strong>
            <div class="form-group" style="margin-top:10px;">
                <label>Promo Type</label>
                <select id="globalPromoType">
                    <option value="None">No Active Promo</option>
                    <option value="Christmas">Christmas Special</option>
                    <option value="Sallah">Sallah Celebration</option>
                    <option value="Easter">Easter</option>
                    <option value="New Year">New Year</option>
                    <option value="Independence">Independence Day</option>
                </select>
            </div>
            <div class="dash-row">
                <div class="form-group" style="flex:1"><label>Discount (%)</label><input type="number" id="globalDiscount" value="0"></div>
                <button class="save-btn" style="background: var(--pro-purple); margin-top: 20px;" onclick="applyGlobalPromo()">ACTIVATE</button>
            </div>
        </div>
    </div>

    <div class="add-item-box">
        <div class="form-group">
            <label>Dish Name</label>
            <input type="text" id="newName" placeholder="e.g. Jollof Rice">
        </div>
        <div class="form-group">
            <label>Category</label>
           <select id="newCategory">
                  <option value="Main Dish">Main Dish</option>
                  <option value="Swallow">Swallow</option> <option value="Side/Protein">Side/Protein</option>
                  <option value="Snacks">Snacks</option>
                <option value="Drinks">Drinks</option>
            </select>
        </div>
        <div class="form-group">
            <label>Price (₦)</label>
            <input type="number" id="newPrice" placeholder="2500">
        </div>
        <div class="form-group">
            <label>Initial Stock</label>
            <input type="number" id="newQty" value="50">
        </div>
        <div class="form-group">
            <label>Image</label>
            <input type="file" id="newImgFile" accept="image/*">
        </div>
        <div class="form-group">
            <label>Inventory Status</label>
            <select id="newStatus">
                <option value="Available">Available</option>
                <option value="Sold Out">Sold Out</option>
            </select>
        </div>
        <button class="add-btn" onclick="addItem()">+ ADD ITEM</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Img</th>
                    <th style="width: 15%;">Item Name</th>
                    <th>Category</th>
                    <th>Base Price</th>
                    <th>Stock Qty</th>
                    <th>Promo Price</th>
                    <th style="width: 15%;">Change Image</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="menuTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = window.location.origin;

    function showToast(msg, color = "#333") {
        const t = document.getElementById("toast");
        t.innerText = msg; t.style.backgroundColor = color;
        t.className = "show"; setTimeout(() => { t.className = ""; }, 3000);
    }

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

   async function loadMenu() {
        try {
            const res = await fetch(`${API_URL}/get_menu`);
            const menu = await res.json();
            const tbody = document.getElementById('menuTableBody');
            tbody.innerHTML = '';
            
            menu.forEach(item => {
                const displayImg = item.image || 'https://via.placeholder.com/50';
                
                // We give the row an ID so we can remove it instantly from the UI
                const row = document.createElement('tr');
                row.id = `row-${item.id}`; 
                
                row.innerHTML = `
                    <td><img src="${displayImg}" class="img-preview" id="prev-${item.id}" onerror="this.src='https://via.placeholder.com/50'"></td>
                    <td><input type="text" id="n-${item.id}" class="table-input" value="${item.name}"></td>
                    <td>
                       <select id="c-${item.id}" class="table-input">
                            <option value="Main Dish" ${item.category === 'Main Dish' ? 'selected' : ''}>Main Dish</option>
                            <option value="Swallow" ${item.category === 'Swallow' ? 'selected' : ''}>Swallow</option> 
                            <option value="Side/Protein" ${item.category === 'Side/Protein' ? 'selected' : ''}>Side/Protein</option>
                            <option value="Snacks" ${item.category === 'Snacks' ? 'selected' : ''}>Snacks</option>
                            <option value="Drinks" ${item.category === 'Drinks' ? 'selected' : ''}>Drinks</option>
                        </select>
                    </td>
                    <td><input type="number" id="p-${item.id}" class="table-input" value="${item.price}"></td>
                    <td><input type="number" id="q-${item.id}" class="table-input stock-input" value="${item.quantity || 0}"></td>
                    <td><input type="number" id="pr-${item.id}" class="table-input" style="color:var(--oxela-dark)" value="${item.promo_price || 0}"></td>
                    <td><input type="file" id="file-${item.id}" class="table-input" accept="image/*"></td>
                    <td>
                        <select id="s-${item.id}" class="table-input">
                            <option value="Available" ${item.status === 'Available' ? 'selected' : ''}>Available</option>
                            <option value="Sold Out" ${item.status === 'Sold Out' ? 'selected' : ''}>Sold Out</option>
                        </select>
                    </td>
                    <td>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <button class="save-btn" onclick="updateItem('${item.id}', '${item.image || ''}')">UPDATE</button>
                            <button class="del-btn" style="background:none; color:var(--danger); font-size:1.2rem; border:none; cursor:pointer; padding:0 5px;" onclick="deleteItem('${item.id}')">✖</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        } catch (err) { 
            showToast("Connection Failed", "#e74c3c"); 
        }
    }

    async function deleteItem(id) {
        // 1. Immediate UI Feedback (Remove from screen now)
        const row = document.getElementById(`row-${id}`);
        if (row) row.style.display = 'none';

        try {
            // 2. Silent background delete
            const res = await fetch(`${API_URL}/delete_menu_item/${id}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                showToast("Item removed", "#e74c3c");
            } else {
                // If the server fails, bring the row back so the user knows
                if (row) row.style.display = 'table-row';
                showToast("Delete failed on server", "#e74c3c");
            }
        } catch (err) {
            if (row) row.style.display = 'table-row';
            showToast("Network Error", "#e74c3c");
        }
    }    function addNewComboRow() {
        const name = document.getElementById('customComboName').value;
        const price = document.getElementById('customComboPrice').value;
        if(!name || !price) return showToast("Name and Price required", "#e67e22");
        
        const container = document.getElementById('combo-list');
        const div = document.createElement('div');
        div.className = "combo-tag";
        div.innerHTML = `${name}: ₦<input type="number" class="inflation-val" data-match="${name}" value="${price}">`;
        container.appendChild(div);
        
        document.getElementById('customComboName').value = '';
        document.getElementById('customComboPrice').value = '';
    }

    async function applyInflation() {
        const inputs = document.querySelectorAll('.inflation-val');
        const res = await fetch(`${API_URL}/get_menu`);
        const menu = await res.json();
        let updateCount = 0;

        for(let input of inputs) {
            const keyword = input.getAttribute('data-match').toLowerCase();
            const newPrice = parseInt(input.value);

            for(let item of menu) {
                if(item.name.toLowerCase().includes(keyword)) {
                    item.price = newPrice;
                    await fetch(`${API_URL}/update_menu_item`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(item)
                    });
                    updateCount++;
                }
            }
        }
        showToast(`Updated ${updateCount} items!`, "#27ae60");
        loadMenu();
    }

    async function applyGlobalPromo() {
        const discount = parseInt(document.getElementById('globalDiscount').value);
        const res = await fetch(`${API_URL}/get_menu`);
        const menu = await res.json();
        for(let item of menu) {
            item.promo_price = discount > 0 ? Math.round(item.price * (1 - (discount/100))) : 0;
            await fetch(`${API_URL}/update_menu_item`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(item)
            });
        }
        showToast(`Global Promo Applied!`, "#8e44ad");
        loadMenu();
    }

    async function addItem() {
        const fileInput = document.getElementById('newImgFile');
        let imageStr = "";

        if (fileInput.files.length > 0) {
            imageStr = await toBase64(fileInput.files[0]);
        }

        const payload = {
            name: document.getElementById('newName').value,
            category: document.getElementById('newCategory').value,
            price: parseInt(document.getElementById('newPrice').value),
            quantity: parseInt(document.getElementById('newQty').value) || 0,
            image: imageStr,
            status: document.getElementById('newStatus').value,
            promo_price: 0
        };

        if(!payload.name || isNaN(payload.price)) return showToast("Name and Price required", "#e67e22");

        try {
            const res = await fetch(`${API_URL}/add_menu_item`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                showToast("Item Added!", "#27ae60");
                document.getElementById('newName').value = '';
                document.getElementById('newPrice').value = '';
                document.getElementById('newQty').value = '50';
                document.getElementById('newImgFile').value = '';
                loadMenu();
            }
        } catch (err) { showToast("Error adding item", "#e74c3c"); }
    }

    async function updateItem(id, existingImage) {
        const fileInput = document.getElementById(`file-${id}`);
        let imageStr = existingImage;

        if (fileInput.files.length > 0) {
            imageStr = await toBase64(fileInput.files[0]);
        }

        const payload = {
            id: id,
            name: document.getElementById(`n-${id}`).value,
            category: document.getElementById(`c-${id}`).value,
            price: parseInt(document.getElementById(`p-${id}`).value),
            quantity: parseInt(document.getElementById(`q-${id}`).value),
            promo_price: parseInt(document.getElementById(`pr-${id}`).value),
            image: imageStr,
            status: document.getElementById(`s-${id}`).value
        };

        try {
            const res = await fetch(`${API_URL}/update_menu_item`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                showToast("Update Successful!", "#27ae60");
                loadMenu();
            }
        } catch (err) { showToast("Update Failed", "#e74c3c"); }
    }

    async function deleteItem(id) {
        if (!confirm("Are you sure you want to remove this item permanently?")) return;

        try {
            const res = await fetch(`${API_URL}/delete_menu_item/${id}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                showToast("Item Removed!", "#e74c3c");
                loadMenu(); 
            } else {
                showToast("Failed to delete", "#e74c3c");
            }
        } catch (err) {
            showToast("Server Error", "#e74c3c");
        }
    }

    loadMenu();
</script>
</body>
</html>
