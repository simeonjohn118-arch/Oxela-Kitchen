<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Analytics | O'XELA KITCHEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e67e22; 
            --primary-dark: #d35400; 
            --success: #10b981;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex;
            color: var(--text-main);
        }

        /* --- NAVIGATION SIDEBAR --- */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--white);
            border-right: 1px solid #e2e8f0;
            padding: 40px 24px;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 50px;
            letter-spacing: -1px;
        }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        
        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            padding: 14px 18px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link:hover { background: #f1f5f9; color: var(--text-main); }
        .nav-link.active { background: #fff4ed; color: var(--primary); }

        /* --- MAIN AREA --- */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 50px;
            max-width: 1200px;
        }

        .header-box { margin-bottom: 40px; }
        .header-box h1 { margin: 0; font-size: 2rem; font-weight: 800; }
        .header-box p { color: var(--text-muted); margin: 5px 0 0; }

        /* --- TOP ANALYTICS CARDS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
        }

        .card.revenue-today {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
        }

        .card small { 
            display: block;
            text-transform: uppercase; 
            font-size: 0.75rem; 
            font-weight: 700; 
            letter-spacing: 1px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .card h2 { margin: 0; font-size: 2.2rem; font-weight: 800; }

        /* --- MONTHLY GROUPING --- */
        .month-section { margin-bottom: 40px; }
        
        .month-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }

        .month-title-bar h3 { margin: 0; font-size: 1.2rem; color: var(--text-main); font-weight: 800; }
        .month-total-label { color: var(--success); font-weight: 700; background: #ecfdf5; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; }

        /* --- DATA TABLE --- */
        .table-section {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #fdfdfd; 
            padding: 15px 30px; 
            text-align: left; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        td { padding: 18px 30px; border-bottom: 1px solid #f8fafc; font-size: 0.95rem; }

        .order-tag {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            color: var(--primary);
        }

        .amount-text { font-weight: 700; color: var(--text-main); }
        .date-text { color: var(--text-muted); font-size: 0.85rem; }

        /* --- EMPTY STATE --- */
        #empty-msg { padding: 50px; text-align: center; color: var(--text-muted); display: none; }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 40px 10px; }
            .sidebar span, .logo span { display: none; }
            .main-content { margin-left: 80px; padding: 30px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo">🟠 <span>O'XELA</span></div>
    
    <div class="nav-group">
        <a href="admin_hub.html" class="nav-link">🏠 <span>Dashboard Hub</span></a>
        <a href="order_dashboard.html" class="nav-link">🛍️ <span>Live Orders</span></a>
        <a href="sales_records.html" class="nav-link active">📊 <span>Sales Records</span></a>
        <a href="admin_menu.html" class="nav-link">🍴 <span>Menu Items</span></a>
    </div>

    <div style="margin-top: auto;">
        <a href="#" onclick="fetchSalesData()" class="nav-link">🔄 <span>Refresh Data</span></a>
    </div>
</nav>

<main class="main-content">
    <div class="header-box">
        <h1>Sales & Revenue</h1>
        <p>Review today's performance and monthly transaction history.</p>
    </div>

    <div class="stats-grid">
        <div class="card revenue-today">
            <small>Today's Revenue</small>
            <h2 id="dailyRevenue">₦0</h2>
        </div>
        <div class="card">
            <small>Gross Lifetime Revenue</small>
            <h2 id="totalRevenue" style="color: var(--success);">₦0</h2>
        </div>
    </div>

    <div id="empty-msg">No confirmed sales records found yet.</div>
    
    <div id="history-container"></div>
</main>

<script>
    const API_URL = "http://127.0.0.1:5000";

    async function fetchSalesData() {
        try {
            const res = await fetch(`${API_URL}/get_sales_stats`);
            const data = await res.json();

            // 1. Update Top Statistic Cards (Backend should already sum regular + special)
            document.getElementById('dailyRevenue').innerText = `₦${data.daily_revenue.toLocaleString()}`;
            document.getElementById('totalRevenue').innerText = `₦${data.total_revenue.toLocaleString()}`;

            const container = document.getElementById('history-container');
            const emptyMsg = document.getElementById('empty-msg');
            
            container.innerHTML = '';

            const months = Object.keys(data.monthly_data);

            if (months.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';

            // 2. Loop through months and build tables
            months.reverse().forEach(monthKey => {
                const monthInfo = data.monthly_data[monthKey];
                
                const section = document.createElement('div');
                section.className = 'month-section';
                
                section.innerHTML = `
                    <div class="month-title-bar">
                        <h3>${monthKey}</h3>
                        <span class="month-total-label">Monthly Total: ₦${monthInfo.total.toLocaleString()}</span>
                    </div>
                    <div class="table-section">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Reference</th>
                                    <th>Customer</th>
                                    <th>Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${monthInfo.transactions.reverse().map(sale => {
                                    // Identify if it's a Special Order (usually starts with SPEC or has unique property)
                                    const isSpecial = sale.order_id.toString().includes('SPEC') || sale.type === 'special';
                                    const displayAmount = sale.total || sale.budget || 0;
                                    const typeLabel = isSpecial ? '<span style="color:#e67e22; font-weight:bold;">SPECIAL</span>' : 'REGULAR';
                                    
                                    return `
                                    <tr>
                                        <td><span class="date-text">${sale.timestamp.split(' ')[0]}</span></td>
                                        <td><small>${typeLabel}</small></td>
                                        <td><span class="order-tag">${sale.order_id}</span></td>
                                        <td><b>${sale.customer_name}</b></td>
                                        <td><span class="amount-text">₦${displayAmount.toLocaleString()}</span></td>
                                    </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                container.appendChild(section);
            });

        } catch (err) {
            console.error("Sales Fetch Error:", err);
            alert("Could not connect to backend to fetch sales.");
        }
    }

    fetchSalesData();
</script>

</body>
</html>
