<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'XELA | History</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
   <style>
        :root {
            --oxela-orange: #e67e22;
            --oxela-dark: #d35400;
            --bg-light: #fcfcfc;
        }

        /* --- MOBILE OPTIMIZATION --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Makes mobile taps cleaner */
        }

        body {
            background-color: var(--bg-light);
            color: #333;
            line-height: 1.6;
            width: 100%;
            overflow-x: hidden; /* Prevents side-scrolling on phones */
        }

        .header {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        .back-btn {
            text-decoration: none;
            color: var(--oxela-orange);
            font-size: 1.2rem;
            margin-right: 15px;
            font-weight: bold;
        }

        .header h1 {
            font-size: 1.1rem;
            color: var(--oxela-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container {
            padding: 15px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .intro {
            margin-bottom: 25px;
            text-align: center;
        }

        .intro p {
            color: #666;
            font-size: 0.9rem;
            padding: 0 10px;
        }

        .faq-item {
            background: white;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            border: 1px solid #eee;
        }

        .faq-question {
            padding: 15px 18px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: none;
            border: none;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .faq-question:hover {
            background: #fff9f4;
        }

        .faq-answer {
            padding: 0 18px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: white;
            color: #555;
            font-size: 0.85rem;
        }

        .faq-item.active .faq-answer {
            padding: 0 18px 15px 18px;
            max-height: 1000px; /* High enough to allow long text to wrap on mobile */
        }

        .faq-item.active .faq-question {
            color: var(--oxela-orange);
        }

        .arrow {
            transition: transform 0.3s;
            color: var(--oxela-orange);
            flex-shrink: 0; /* Prevents arrow from squishing on small screens */
        }

        .faq-item.active .arrow {
            transform: rotate(180deg);
        }

        .contact-box {
            margin-top: 30px;
            background: #fff3e0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px dashed var(--oxela-orange);
            margin-bottom: 20px;
        }

        .contact-box h3 {
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--oxela-dark);
        }

        .gmail-link {
            display: inline-block;
            background: var(--oxela-orange);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: 0.3s;
        }

        #customAlert {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10000;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 12px;
            width: 90%; /* Fluid width for mobile */
            max-width: 320px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #customAlert.show {
            bottom: 30px;
        }

        .alert-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff6b6b;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <a href="/home" style="color: white; text-decoration: none; font-weight: 800;">←</a>
        <h2 style="font-size: 1.1rem; letter-spacing: 1px;">ORDER HISTORY</h2>
        <div style="width: 20px;"></div>
    </div>

    <div class="container" id="historyContainer">
    </div>

    <div class="footer-nav">
        <a href="/home" class="nav-item">
            <span class="nav-icon">🏠</span><span>Home</span>
        </a>
        <a href="/orders" class="nav-item">
            <span class="nav-icon">🛒</span><span>Order</span>
        </a>
        <a href="/history" class="nav-item active">
            <span class="nav-icon">📜</span><span>History</span>
        </a>
        <a href="/profile" class="nav-item">
            <span class="nav-icon">👤</span><span>Profile</span>
        </a>
    </div>

<script>
   const API_URL = window.location.origin;

    async function displayHistory() {
        const container = document.getElementById('historyContainer');
        const storedUser = localStorage.getItem('oxela_user');

        if (!storedUser) {
            container.innerHTML = `<div style="text-align:center; padding-top:100px;">
                <p style="color:#64748b;">Please login to view history</p>
                <a href="login.html" style="color:var(--accent); font-weight:800;">Login Now</a>
            </div>`;
            return;
        }

        const userData = JSON.parse(storedUser);
        const email = userData.email;

        try {
            const response = await fetch(`${API_URL}/user_orders/${email}`);
            if (!response.ok) throw new Error("Server Error");

            const history = await response.json();

            if (history.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:100px 20px; color:#94a3b8;">
                        <span style="font-size:3rem;">🍽️</span>
                        <h3 style="margin-top:10px;">No Orders Yet</h3>
                        <p style="font-size:0.8rem;">When you order a meal, it will appear here!</p>
                    </div>`;
                return;
            }

            // Reverse to show newest first
            container.innerHTML = history.reverse().map(order => {
                const isSuccess = order.status && order.status.toUpperCase() === 'SUCCESSFUL';
                const statusLabel = order.status || 'PENDING';
                const badgeClass = isSuccess ? 'badge-successful' : 'badge-pending';

                let itemsList = "";
                if (order.items && Array.isArray(order.items)) {
                    itemsList = order.items.map(i => i.name).join(', ');
                } else {
                    itemsList = order.description || "Special Kitchen Request";
                }

                return `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">${order.order_id}</div>
                            <div class="order-date">${order.timestamp}</div>
                        </div>
                        <span class="status-badge ${badgeClass}">${statusLabel}</span>
                    </div>
                    
                    <div class="items-box">
                        ${itemsList}
                    </div>
                    
                    <div class="order-footer">
                        <span style="font-size:0.7rem; color:#94a3b8; font-weight:700; text-transform:uppercase;">Amount Paid</span>
                        <span class="price-tag">${order.total || order.budget || 'N/A'}</span>
                    </div>
                </div>
                `;
            }).join('');

        } catch (err) {
            container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--accent);">
                <p>Connection Lost</p>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--dark); font-weight:800; cursor:pointer;">Retry ↻</button>
            </div>`;
        }
    }

    window.onload = displayHistory;
</script>
</body>
</html>
