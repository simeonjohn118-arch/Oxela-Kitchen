<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'XELA | My Profile</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6b6b; 
            --gold: #ffb800;
            --dark: #0f172a; 
            --glass: rgba(255, 255, 255, 0.9);
            --bg: #f0f2f5; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, #ffe3e3 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, #ffedbc 0%, transparent 50%);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .profile-hero {
            height: 220px;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=500&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            border-radius: 0 0 40px 40px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .avatar-container {
            position: absolute;
            bottom: -50px;
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.2);
            overflow: hidden;
        }

        .avatar-initial {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 450px; margin: 60px auto 0; padding: 0 20px; }

        .user-meta { text-align: center; margin-bottom: 25px; }
        .user-meta h2 { font-size: 1.8rem; font-weight: 800; color: var(--dark); }
        .user-meta p { color: #64748b; font-weight: 500; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid white;
            text-align: center;
        }
        .stat-card span { display: block; }
        .stat-label { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--dark); margin-top: 5px; }

        .info-group {
            background: var(--glass);
            border-radius: 30px;
            padding: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid white;
            margin-bottom: 20px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 15px;
            gap: 15px;
        }
        .info-icon {
            width: 45px;
            height: 45px;
            background: #fff5f5;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .info-content { flex: 1; }
        .info-content label { display: block; font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .info-content span { font-size: 0.95rem; font-weight: 600; color: var(--dark); }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-edit { background: var(--dark); color: white; box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2); }
        .btn-logout { background: white; color: var(--accent); margin-top: 15px; border: 2px solid #ffe3e3; }

        .footer-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 15px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-item { text-decoration: none; color: #bbb; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; font-weight: 600; }
        .nav-item i { font-size: 1.3rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="profile-hero">
        <h1 style="font-weight: 800; letter-spacing: 2px; opacity: 0.9;">O'XELA</h1>
        <div class="avatar-container">
            <span class="avatar-initial" id="pInitial">U</span>
        </div>
    </div>

    <div class="container">
        <div class="user-meta">
            <h2 id="pName">Loading...</h2>
            <p id="pEmail">user@email.com</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-label">Rank</span>
                <span class="stat-value" style="color:var(--gold)">Gold Elite</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Orders</span>
                <span class="stat-value" id="pOrderCount">0</span>
            </div>
        </div>

        <div class="info-group">
            <div class="info-item">
                <div class="info-icon">📞</div>
                <div class="info-content">
                    <label>Phone Number</label>
                    <span id="pPhone">Fetching...</span>
                </div>
            </div>
            <div style="height: 1px; background: #f1f5f9; margin: 0 15px;"></div>
            <div class="info-item">
                <div class="info-icon">📍</div>
                <div class="info-content">
                    <label>Default Address</label>
                    <span id="pAddress">Fetching...</span>
                </div>
            </div>
        </div>

        <button class="btn btn-edit" onclick="location.href='edit-profile.html'">
            <span>Edit Profile</span> ✏️
        </button>
        
        <button class="btn btn-logout" onclick="handleLogout()">
            <span>Logout</span> 🚪
        </button>
    </div>

    <div class="footer-nav">
        <a href="templates/customer/home.html" class="nav-item"><i class="fas fa-utensils"></i><span>Menu</span></a>
        <a href="templates/customer/orders.html" class="nav-item"><i class="fas fa-receipt"></i><span>Orders</span></a>
        <a href="templates/customer/special.html" class="nav-item"><i class="fas fa-star"></i><span>Special</span></a>
        <a href="templates/customer/profile.html" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function fetchProfileData() {
            const session = JSON.parse(localStorage.getItem('oxela_user'));
            
            if (!session || (!session.email && !session.user_email)) { 
                window.location.href = 'login.html'; 
                return; 
            }

            const email = session.email || session.user_email;

            try {
                // Fetch User Details
                const userRes = await fetch(`${API_URL}/get_profile/${email}`);
                
                if (userRes.ok) {
                    const user = await userRes.json();
                    
                    const name = user.name || user.full_name || "Foodie";
                    const phone = user.phone || user.phone_number || "Not linked";
                    const address = user.address || user.location || "No address saved";

                    document.getElementById('pName').innerText = name;
                    document.getElementById('pEmail').innerText = user.email || email;
                    document.getElementById('pPhone').innerText = phone;
                    document.getElementById('pAddress').innerText = address;
                    
                    document.getElementById('pInitial').innerText = name[0].toUpperCase();
                }

                // Fetch Order Count (including Special Orders)
                const orderRes = await fetch(`${API_URL}/user_orders/${email}`);
                if (orderRes.ok) {
                    const orders = await orderRes.json();
                    document.getElementById('pOrderCount').innerText = orders.length;
                }

            } catch (err) {
                console.error("Database error:", err);
                document.getElementById('pName').innerText = "System Offline";
            }
        }

        function handleLogout() {
            localStorage.removeItem('oxela_user');
            window.location.href = 'login.html';
        }

        window.onload = fetchProfileData;
    </script>
</body>
</html>
