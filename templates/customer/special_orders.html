<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'XELA | Special Request Chat</title><link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff6b6b;
            --bg: #0a0a0a;
            --card: #121212;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        header {
            padding: 20px 30px;
            background: var(--card);
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-meta h1 { font-size: 1.2rem; font-weight: 800; }
        .order-meta span { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* --- CHAT AREA --- */
        #chatContainer {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* --- BUBBLES --- */
        .msg { max-width: 80%; padding: 15px 20px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; position: relative; }
        
        .msg.customer {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.staff {
            align-self: flex-start;
            background: var(--card);
            border: 1px solid #1a1a1a;
            border-bottom-left-radius: 4px;
        }

        .msg.initial-issue {
            align-self: center;
            background: var(--glass);
            border: 1px dashed #333;
            text-align: center;
            max-width: 90%;
            font-style: italic;
            color: var(--text-dim);
        }

        .timestamp { font-size: 0.7rem; opacity: 0.6; margin-top: 8px; display: block; text-align: right; }

        /* --- INPUT AREA --- */
        .input-area {
            padding: 25px;
            background: var(--card);
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid #222;
            padding: 18px;
            border-radius: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3); }

        /* Custom Scrollbar */
        #chatContainer::-webkit-scrollbar { width: 5px; }
        #chatContainer::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="order-meta">
            <span id="orderIdLabel">Loading Order...</span>
            <h1 id="orderTitle">Direct Chat</h1>
        </div>
        <button onclick="window.history.back()" style="padding: 10px 20px; background: transparent; border: 1px solid #333;">Back</button>
    </header>

    <div id="chatContainer">
        </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type your special instructions..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">SEND 🚀</button>
    </div>

    <script>
        const API_URL = window.location.origin;
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id'); 
        const senderType = "Customer"; // Change this to "Staff" for the Master App version

        document.getElementById('orderIdLabel').innerText = `Request #${orderId}`;

        async function loadChat() {
            try {
                const res = await fetch(`${API_URL}/get_chat/${orderId}`);
                const messages = await res.json();
                
                const container = document.getElementById('chatContainer');
                container.innerHTML = '';

                messages.forEach(m => {
                    const isStaff = m.sender.toLowerCase().includes('staff') || m.sender.toLowerCase().includes('admin');
                    const isInitial = m.sender.toLowerCase().includes('initial');
                    
                    let className = isStaff ? 'staff' : 'customer';
                    if (isInitial) className = 'initial-issue';

                    container.innerHTML += `
                        <div class="msg ${className}">
                            <strong>${m.sender}</strong><br>
                            ${m.text}
                            <span class="timestamp">${m.timestamp}</span>
                        </div>
                    `;
                });
                // Auto-scroll to bottom
                container.scrollTop = container.scrollHeight;
            } catch (e) { console.error("Chat error", e); }
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;

            const payload = {
                order_id: orderId,
                sender: senderType,
                text: input.value
            };

            try {
                const res = await fetch(`${API_URL}/send_message`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    input.value = '';
                    loadChat();
                }
            } catch (e) { alert("Failed to send"); }
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        // Refresh every 5 seconds for live feel
        loadChat();
        setInterval(loadChat, 5000);
    </script>
</body>
</html>
