<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'XELA | Delivery Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
        <link rel="manifest" href="/static/manifest.json">
    <style>
        :root { 
            --accent: #ff6b6b; 
            --accent-glow: rgba(255, 107, 107, 0.3);
            --dark: #0f0f0f; 
            --sidebar-bg: #161616;
            --card-bg: #ffffff;
            --bg: #f8fafb; 
            --sidebar-w: 280px; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; overflow-x: hidden; color: var(--dark); }

        /* --- MODERN SIDE NAVIGATION --- */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }

        .logo-area { 
            font-weight: 800; font-size: 1.6rem; color: white; 
            margin-bottom: 60px; letter-spacing: -1px; 
        }
        .logo-area span { color: var(--accent); }

        .nav-list { list-style: none; }
        .nav-item {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            display: flex;
            align-items: center;
            padding: 18px 20px;
            border-radius: 20px;
            margin-bottom: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.95rem;
        }
        
        .nav-item:hover { color: #eee; transform: translateX(5px); }
        .nav-item.active { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 10px 20px var(--accent-glow);
        }
        .nav-icon { margin-right: 15px; font-size: 1.3rem; }

        /* --- MAIN CONTENT AREA --- */
        .main {
            margin-left: var(--sidebar-w);
            width: calc(100% - var(--sidebar-w));
            padding: 50px;
        }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header-flex h2 { font-weight: 800; font-size: 1.8rem; }

        .admin-card { 
            background: var(--card-bg); 
            border-radius: 35px; 
            padding: 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.04); 
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .section-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 25px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }

        /* --- INPUT STYLING --- */
        .input-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 15px; align-items: end; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--dark); margin-bottom: 10px; margin-left: 5px; }
        input { 
            width: 100%; padding: 18px 22px; border-radius: 20px; 
            border: 2px solid #f0f2f5; background: #f8fafb; outline: none; 
            font-weight: 600; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }

        .btn-add { 
            background: var(--dark); color: white; border: none; 
            padding: 18px 30px; border-radius: 20px; font-weight: 800; 
            cursor: pointer; transition: 0.3s; height: 60px;
        }
        .btn-add:hover { background: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px var(--accent-glow); }

        /* --- ZONE LIST STYLING --- */
        .zone-table { width: 100%; border-collapse: collapse; }
        .zone-table tr td { padding: 20px 10px; border-bottom: 1px solid #f1f1f1; }
        .zone-name { font-weight: 700; font-size: 1.1rem; }
        .price-wrapper { display: flex; align-items: center; gap: 15px; justify-content: flex-end; }
        .price-input { width: 120px; text-align: center; background: #fff; border: 2px solid #eee; }
        
        .btn-update { 
            background: #f0f2f5; color: var(--dark); border: none; 
            padding: 12px 20px; border-radius: 15px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; 
        }
        .btn-update:hover { background: var(--dark); color: white; }

        /* --- CLASSIC O'XELA TOAST --- */
        #customAlert { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: #1a1a1a; color: white; padding: 18px 30px; border-radius: 20px; 
            font-weight: 500; z-index: 10000; transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            display: flex; align-items: center; gap: 15px; min-width: 320px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        #customAlert.show { bottom: 40px; }
        .alert-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        @media (max-width: 1100px) {
            .input-row { grid-template-columns: 1fr; }
            .btn-add { width: 100%; }
        }

        @media (max-width: 900px) {
            .sidebar { width: 90px; padding: 40px 15px; }
            .logo-area, .nav-item span:not(.nav-icon) { display: none; }
            .main { margin-left: 90px; width: calc(100% - 90px); padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">O'XELA <span>KITCHEN</span></div>
        <nav class="nav-list">
            <a href="admin_hub.html" class="nav-item">
                <span class="nav-icon">🎛️</span> <span>Admin Hub</span>
            </a>
            <a href="order_dashboard.html" class="nav-item">
                <span class="nav-icon">🛒</span> <span>Live Orders</span>
            </a>
            <a href="delivery_admin.html" class="nav-item active">
                <span class="nav-icon">🚚</span> <span>Delivery zone</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span> <span>Store setting</span>
            </a>
        </nav>
    </div>

    <main class="main">
        <div class="header-flex">
            <h2>Delivery Management</h2>
        </div>

        <div class="admin-card">
            <div class="section-title">New Location</div>
            <div class="input-row">
                <div class="input-group">
                    <label>Zone Name</label>
                    <input type="text" id="locName" placeholder="e.g. Phase 4, Abuja">
                </div>
                <div class="input-group">
                    <label>Price (₦)</label>
                    <input type="number" id="locPrice" placeholder="500">
                </div>
                <button class="btn-add" onclick="addNewZone()">Create Zone ⚡</button>
            </div>
        </div>

        <div class="admin-card">
            <div class="section-title">Active Delivery Rates</div>
            <table class="zone-table" id="zoneTable">
                <tbody id="zoneContainer">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="customAlert">
        <div class="alert-dot"></div>
        <span id="alertMessage"></span>
    </div>

    <script>
       const API_URL = window.location.origin;
        // TOAST FUNCTION
        function showToast(msg) {
            const alert = document.getElementById('customAlert');
            document.getElementById('alertMessage').innerText = msg;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        // LOAD ZONES FROM PYTHON
        async function loadZones() {
            try {
                const res = await fetch(`${API_URL}/get_delivery_zones`);
                const zones = await res.json();
                const container = document.getElementById('zoneContainer');
                container.innerHTML = "";

                zones.forEach(z => {
                    container.innerHTML += `
                        <tr>
                            <td class="zone-name">${z.location}</td>
                            <td>
                                <div class="price-wrapper">
                                    <input type="number" class="price-input" id="price-${z.id}" value="${z.price}">
                                    <button class="btn-update" onclick="updateZone('${z.id}', '${z.location}')">Update</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch(e) { 
                showToast("Connection to Python failed ❌"); 
            }
        }

        // ADD NEW ZONE
        async function addNewZone() {
            const location = document.getElementById('locName').value;
            const price = document.getElementById('locPrice').value;

            if(!location || !price) {
                showToast("Input location and price!"); 
                return;
            }

            const res = await fetch(`${API_URL}/update_delivery_zone`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ location, price: parseInt(price) })
            });

            if(res.ok) {
                showToast("New Zone Added! ✅");
                document.getElementById('locName').value = "";
                document.getElementById('locPrice').value = "";
                loadZones();
            }
        }

        // UPDATE EXISTING ZONE
        async function updateZone(id, locName) {
            const price = document.getElementById(`price-${id}`).value;

            const res = await fetch(`${API_URL}/update_delivery_zone`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, location: locName, price: parseInt(price) })
            });

            if(res.ok) {
                showToast("Delivery Rate Updated! ⚡");
                loadZones();
            }
        }

        window.onload = loadZones;
    </script>
</body>
</html>
