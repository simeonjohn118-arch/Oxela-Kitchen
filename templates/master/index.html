<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | O'Xela Kitchen</title>
    
    <link rel="manifest" href="/static/manifest.json">
    <style>
        :root { --oxela-orange: #e67e22; --oxela-dark: #d35400; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; position: relative; }
        h2 { color: var(--oxela-dark); margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-size: 0.85rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline-color: var(--oxela-orange); }
        
        .action-btn { background: var(--oxela-orange); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .action-btn:hover { background: var(--oxela-dark); }
        
        .toggle-text { margin-top: 20px; font-size: 0.85rem; color: #666; }
        .toggle-text span { color: var(--oxela-orange); cursor: pointer; font-weight: bold; }

        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center;
            border-radius: 10px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .hidden { display: none; }
        #installBtn { background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px;}
    </style>
</head>
<body>

<div id="toast">Message here</div>

<div class="auth-card">
    <button id="installBtn" style="display:none;">📥 Download O'Xela App</button>

    <form id="loginForm">
        <h2>Admin Login 🔐</h2>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" name="username" id="loginEmail" placeholder="admin@oxela.com" required>
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="action-btn">Enter Dashboard</button>
        
        <p class="toggle-text"><span onclick="showForm('forgotForm')">Forgot Password?</span></p>
        <p class="toggle-text">New Chef? <span onclick="showForm('registerForm')">Register here</span></p>
    </form>

    <div id="registerForm" class="hidden">
        <h2>Admin Registration 👨‍🍳</h2>
        <div class="input-group"><label>Name</label><input type="text" id="regName" placeholder="Chef Name"></div>
        <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="admin@oxela.com"></div>
        <div class="input-group"><label>Password</label><input type="password" id="regPassword" placeholder="••••••••"></div>
        <button class="action-btn" onclick="handleRegister()">Create Account</button>
        <p class="toggle-text">Already have an account? <span onclick="showForm('loginForm')">Login here</span></p>
    </div>

    <div id="forgotForm" class="hidden">
        <h2>Reset Access 🔑</h2>
        <p style="font-size: 0.8rem; color: #777;">Enter email to receive code.</p>
        <div class="input-group"><label>Admin Email</label><input type="email" id="resetEmail" placeholder="admin@oxela.com"></div>
        <button class="action-btn" onclick="requestReset()">Send Code</button>
        <p class="toggle-text"><span onclick="showForm('loginForm')">Back to Login</span></p>
    </div>
</div>

<script>
    const API_URL = window.location.origin;

    function showToast(msg, color = "#333") {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.style.backgroundColor = color;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function showForm(formId) {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('forgotForm').classList.add('hidden');
        document.getElementById(formId).classList.remove('hidden');
    }

    // --- UPDATED MASTER LOGIN LOGIC ---
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // STOP the browser from showing the raw JSON text
        
        const formData = new FormData(this);
        
        try {
            const res = await fetch('/master', {
                method: 'POST',
                body: formData
            });
            
            const data = await res.json();
            
            if (data.status === 'success') {
                showToast("Access Granted! Loading Hub...", "#27ae60");
                // This moves the page to your admin_hub
                setTimeout(() => { window.location.href = data.redirect; }, 1000);
            } else {
                showToast(data.message || "Invalid Credentials", "#e74c3c");
            }
        } catch (err) {
            showToast("Connection Error", "#e74c3c");
        }
    });

    async function handleRegister() {
        const payload = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value
        };

        try {
            const res = await fetch(`${API_URL}/admin_register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                showToast("Account Created! Please Login.", "#27ae60");
                setTimeout(() => { showForm('loginForm'); }, 2000);
            } else {
                showToast("Registration Failed", "#e74c3c");
            }
        } catch (err) {
            showToast("Connection Error", "#e74c3c");
        }
    }

    async function requestReset() {
        const email = document.getElementById('resetEmail').value;
        if(!email) return showToast("Enter your email", "#e67e22");
        
        try {
            const res = await fetch(`${API_URL}/forgot_password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            if (res.ok) {
                showToast("Code sent to your email!", "#27ae60");
            } else {
                showToast("Email not found", "#e74c3c");
            }
        } catch (err) {
            showToast("Server busy", "#e74c3c");
        }
    }

    // --- PWA INSTALL LOGIC ---
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';

        installBtn.addEventListener('click', () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
                installBtn.style.display = 'none';
            });
        });
    });

    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
    });
</script>

</body>
</html>
