<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Orders | O'XELA KITCHEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="manifest" href="/static/manifest.json">
    <style>
        :root { 
            --primary: #e67e22; 
            --primary-dark: #d35400; 
            --bg-body: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --pending: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-body); 
            margin: 0; 
            display: flex;
            color: var(--text-main);
        }

        /* --- SIDE NAVIGATION --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--white);
            border-right: 1px solid #e2e8f0;
            padding: 30px 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        .logo-area {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            padding: 12px 15px;
            border-radius: var(--radius);
            margin-bottom: 8px;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-link.active {
            background: #fff4ed;
            color: var(--primary);
        }

        .nav-link:hover:not(.active) {
            background: #f1f5f9;
            color: var(--text-main);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .top-bar h1 { margin: 0; font-size: 1.7rem; font-weight: 700; }

        /* --- STAT CARDS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
        }

        .stat-card small { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; }
        .stat-card h3 { margin: 10px 0 0; font-size: 1.5rem; }

        /* --- TABLE SECTION --- */
        .order-section {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #f1f5f9;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 { font-size: 1.1rem; color: var(--text-main); margin: 0; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f8fafc; vertical-align: middle; }

        .order-id { font-family: monospace; font-weight: 700; color: var(--primary-dark); background: #fff4ed; padding: 4px 8px; border-radius: 4px; }
        
        .customer-info b { display: block; margin-bottom: 2px; }
        .customer-info small { color: var(--text-muted); }

        .badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-success { background: #dcfce7; color: #166534; }

        .btn-confirm {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-confirm:hover { background: var(--primary-dark); transform: scale(1.02); }
        .btn-confirm:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; transform: none; }

        /* --- TOAST --- */
        #toast {
            visibility: hidden; min-width: 280px; background: #1e293b; color: #fff;
            text-align: center; border-radius: 10px; padding: 16px;
            position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        #toast.show { visibility: visible; animation: slideUp 0.4s ease, fadeOut 0.4s 2.6s; }
        @keyframes slideUp { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar span, .logo-area span { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>

<div id="toast">Message</div>

<nav class="sidebar">
    <div class="logo-area">
        🟠 <span>O'XELA </span>
    </div>
    <a href="admin_hub.html" class="nav-link">🏠 <span>Dashboard Hub</span></a>
    <a href="admin_menu.html" class="nav-link">🍴 <span>Menu Management</span></a>
    <a href="#" class="nav-link active">🛍️ <span>Live Orders</span></a>
    <a href="#" class="nav-link">👥 <span>Staff List</span></a>
</nav>

<div class="main-content">
    <div class="top-bar">
        <h1>Live Order Monitoring</h1>
        <div id="refresh-indicator" style="font-size: 0.8rem; color: var(--text-muted);">
            Auto-refreshing in 30s...
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Active Pending</small>
            <h3 id="pending-count" style="color: var(--pending);">0</h3>
        </div>
        <div class="stat-card">
            <small>Total Completed Today</small>
            <h3 id="success-count" style="color: var(--success);">0</h3>
        </div>
    </div>

    <div class="order-section">
        <div class="section-header">
            <h2>Regular Dish Orders</h2>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="regularOrdersBody"></tbody>
            </table>
        </div>
    </div>

    <div class="order-section">
        <div class="section-header">
            <h2>Special Requests</h2>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Details</th>
                        <th>Budget</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="specialOrdersBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
   const API_URL = window.location.origin;

    function showToast(msg, color = "#1e293b") {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.className = "show";
        t.style.backgroundColor = color;
        setTimeout(() => { t.className = ""; }, 3000);
    }

    async function fetchOrders() {
        try {
            const res = await fetch(`${API_URL}/get_all_orders`);
            const data = await res.json();
            
            updateStats(data.regular, data.special);
            renderRegular(data.regular);
            renderSpecial(data.special);
        } catch (err) {
            showToast("Connection to backend lost...", "#ef4444");
        }
    }

    function updateStats(reg, spec) {
        const all = [...reg, ...spec];
        const pending = all.filter(o => o.status === "PENDING" || o.status === "REVIEWING").length;
        const success = all.filter(o => o.status === "SUCCESSFUL").length;
        document.getElementById('pending-count').innerText = pending;
        document.getElementById('success-count').innerText = success;
    }

    function renderRegular(orders) {
        const tbody = document.getElementById('regularOrdersBody');
        tbody.innerHTML = orders.reverse().map(order => {
            const isActive = order.status === "PENDING" || order.status === "REVIEWING";
            
            // Fix: Clean the total string of currency symbols and commas so confirmOrder receives a valid number
            const cleanPrice = String(order.total || "0").replace(/[₦,]/g, '').trim();
            
            return `
                <tr>
                    <td><span class="order-id">${order.order_id}</span><br><small>${order.timestamp.split(' ')[1]}</small></td>
                    <td class="customer-info"><b>${order.customer_name}</b><small>${order.customer_phone}</small></td>
                    <td><small>${order.items.length} items • ₦${order.total}</small></td>
                    <td><span class="badge ${isActive ? 'badge-pending' : 'badge-success'}">${order.status}</span></td>
                    <td>
                        <button class="btn-confirm" onclick="confirmOrder('${order.order_id}', ${cleanPrice})" ${!isActive ? 'disabled' : ''}>
                            ${isActive ? 'CONFIRM' : '✅'}
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function renderSpecial(specials) {
        const tbody = document.getElementById('specialOrdersBody');
        tbody.innerHTML = specials.reverse().map(order => {
            const isActive = order.status === "PENDING" || order.status === "REVIEWING";
            
            // Cleaning budget for security as well
            const cleanBudget = String(order.budget || "0").replace(/[₦,]/g, '').trim();

            return `
                <tr>
                    <td><span class="order-id">${order.order_id}</span></td>
                    <td class="customer-info"><b>${order.customer_name}</b><small>${order.user_email}</small></td>
                    <td><div style="font-size: 0.8rem; color: #64748b; max-width: 200px;">${order.description}</div></td>
                    <td><b>₦${order.budget}</b></td>
                    <td><span class="badge ${isActive ? 'badge-pending' : 'badge-success'}">${order.status}</span></td>
                    <td>
                        <button class="btn-confirm" onclick="confirmOrder('${order.order_id}', ${cleanBudget})" ${!isActive ? 'disabled' : ''}>
                            ${isActive ? 'CONFIRM' : '✅'}
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function confirmOrder(id, amount) {
        try {
            const res = await fetch(`${API_URL}/confirm_order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    order_id: id, 
                    status: "SUCCESSFUL",
                    amount: amount 
                })
            });
            if(res.ok) {
                showToast("Order Marked Successful! Revenue Updated.", "#10b981");
                fetchOrders();
            }
        } catch (err) { showToast("Action failed", "#ef4444"); }
    }

    fetchOrders();
    setInterval(fetchOrders, 30000);
</script>

</body>
</html>
